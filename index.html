<div class="music-player">
    <button onclick="toggleMusic()">🎵 Play Our Song</button>
</div>

<audio id="bgMusic" loop>
    <source src="oursong.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");

function toggleMusic() {
    if (music.paused) {
        music.play();
        event.target.innerHTML = "⏸ Pause Our Song";
    } else {
        music.pause();
        event.target.innerHTML = "🎵 Play Our Song";
    }
}
</script>
